# 1. Start Postgres first (creates shared network).
# From repo root:
#   docker compose -f docker-compose.postgres.yml up -d
# Then start backend, then frontend (see BUILD-ORDER.md).

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeos-postgres
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos_secret
      POSTGRES_DB: gemini
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d gemini"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lifeos-network

networks:
  lifeos-network:
    name: lifeos-network

volumes:
  postgres_data:
