services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeos-postgres
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos_secret
      POSTGRES_DB: gemini
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d gemini"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lifeos-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://lifeos:lifeos_secret@postgres:5432/gemini
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: lifeos-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
