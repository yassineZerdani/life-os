# Replace YOUR_DOMAIN_OR_IP and ensure /var/www/lifeos/frontend-dist contains the built frontend (npm run build).

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/lifeos/frontend-dist;
    index index.html;

    # Frontend SPA: serve static and fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API proxy to backend (no trailing slash in proxy_pass to preserve path)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

